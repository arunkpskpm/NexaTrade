[pytest]
asyncio_mode        = auto
testpaths           = tests
python_files        = test_*.py
python_classes      = Test*
python_functions    = test_*
addopts             =
    --tb=short
    --strict-markers
    -q

markers =
    unit:        Unit tests (no I/O)
    integration: Integration tests (real DB/Redis)
    slow:        Slow tests (backtests, sweeps)
    broker:      Tests requiring broker credentials

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning