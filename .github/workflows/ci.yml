# ──────────────────────────────────────────────────────────────
# NexaTrade — GitHub Actions CI Pipeline
#
# Triggers: push / PR to main and develop branches
#
# Jobs:
#   lint     → ruff linting
#   typecheck → mypy type checking
#   test     → pytest with coverage
#   docker   → Docker build validation
# ──────────────────────────────────────────────────────────────

name: NexaTrade CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  POSTGRES_USER: nexatrade_test
  POSTGRES_PASSWORD: nexatrade_test
  POSTGRES_DB: nexatrade_test_db

jobs:

  # ── Job 1: Lint ─────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Run ruff
        run: ruff check . --output-format=github

  # ── Job 2: Type Check ────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run mypy
        run: mypy . --ignore-missing-imports --no-strict-optional

  # ── Job 3: Tests ─────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: testing
      TRADING_MODE: paper
      ACTIVE_BROKER: paper
      SECRET_KEY: test-secret-key-for-ci-only
      JWT_SECRET_KEY: test-jwt-secret-for-ci-only
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${{ env.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ env.POSTGRES_DB }}
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      INFLUX_URL: http://localhost:8086
      INFLUX_TOKEN: test-token
      INFLUX_ORG: nexatrade
      INFLUX_BUCKET: market_data_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            -v \
            --tb=short \
            --asyncio-mode=auto

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Job 4: Docker Build ──────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: nexatrade:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max