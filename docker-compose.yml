# ──────────────────────────────────────────────────────────────
# NexaTrade — Docker Compose (Development + Production)
#
# Services:
#   nexatrade   → FastAPI application
#   postgres    → PostgreSQL 16
#   redis       → Redis 7
#   influxdb    → InfluxDB v2
#
# Usage:
#   docker compose up -d               # start all
#   docker compose up -d nexatrade     # start only app
#   docker compose logs -f nexatrade   # follow logs
#   docker compose down -v             # stop + remove volumes
# ──────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── NexaTrade Application ─────────────────────────────────
  nexatrade:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: nexatrade_app
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      APP_ENV:          ${APP_ENV:-development}
      DEBUG:            ${DEBUG:-false}
      LOG_LEVEL:        ${LOG_LEVEL:-INFO}
      TRADING_MODE:     ${TRADING_MODE:-paper}
      ACTIVE_BROKER:    ${ACTIVE_BROKER:-paper}
      SECRET_KEY:       ${SECRET_KEY}
      JWT_SECRET_KEY:   ${JWT_SECRET_KEY}
      POSTGRES_HOST:    postgres
      POSTGRES_PORT:    5432
      POSTGRES_USER:    ${POSTGRES_USER:-nexatrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexatrade_password}
      POSTGRES_DB:      ${POSTGRES_DB:-nexatrade_db}
      REDIS_HOST:       redis
      REDIS_PORT:       6379
      INFLUX_URL:       http://influxdb:8086
      INFLUX_TOKEN:     ${INFLUX_TOKEN:-nexatrade-influx-token}
      INFLUX_ORG:       ${INFLUX_ORG:-nexatrade}
      INFLUX_BUCKET:    ${INFLUX_BUCKET:-market_data}
      BREEZE_API_KEY:   ${BREEZE_API_KEY:-}
      BREEZE_API_SECRET: ${BREEZE_API_SECRET:-}
      BREEZE_SESSION_TOKEN: ${BREEZE_SESSION_TOKEN:-}
    volumes:
      - ./plugins:/app/plugins        # strategy hot-reload
      - ./logs:/app/logs              # persisted log files
      - ./.env:/app/.env:ro           # environment file
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - nexatrade_net

  # ── PostgreSQL 16 ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexatrade_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-nexatrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexatrade_password}
      POSTGRES_DB:       ${POSTGRES_DB:-nexatrade_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexatrade}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexatrade_net

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexatrade_redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexatrade_net

  # ── InfluxDB v2 ───────────────────────────────────────────
  influxdb:
    image: influxdb:2.7-alpine
    container_name: nexatrade_influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE:        setup
      DOCKER_INFLUXDB_INIT_USERNAME:    admin
      DOCKER_INFLUXDB_INIT_PASSWORD:    nexatrade_influx_pw
      DOCKER_INFLUXDB_INIT_ORG:         ${INFLUX_ORG:-nexatrade}
      DOCKER_INFLUXDB_INIT_BUCKET:      ${INFLUX_BUCKET:-market_data}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-nexatrade-influx-token}
      DOCKER_INFLUXDB_INIT_RETENTION:   5y
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nexatrade_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  influxdb_data:
    driver: local
  influxdb_config:
    driver: local

networks:
  nexatrade_net:
    driver: bridge
    name: nexatrade_network