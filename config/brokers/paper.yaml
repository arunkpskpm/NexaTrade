# ──────────────────────────────────────────────────────────────
# NexaTrade — Paper Trading Adapter Configuration
# Controls simulation fidelity parameters.
# Tune slippage/commission to match your real broker.
# ──────────────────────────────────────────────────────────────

broker:
  name: "paper"
  display_name: "NexaTrade Paper Trading"
  version: "1.0.0"

  # ── Exchange map (same as live broker) ───────────────────
  exchange_map:
    NSE: "NSE"
    BSE: "BSE"
    NFO: "NFO"
    MCX: "MCX"

  order_type_map:
    MARKET:           "MARKET"
    LIMIT:            "LIMIT"
    STOP_LOSS:        "STOP_LOSS"
    STOP_LOSS_MARKET: "STOP_LOSS_MARKET"

  transaction_type_map:
    BUY:  "BUY"
    SELL: "SELL"

  interval_map:
    "1minute":  "1minute"
    "5minute":  "5minute"
    "15minute": "15minute"
    "30minute": "30minute"
    "1hour":    "1hour"
    "1day":     "1day"

  # ── Simulation parameters ─────────────────────────────────
  simulation:
    slippage_pct: 0.05              # 0.05% slippage per fill
    commission_pct: 0.03            # 0.03% commission per trade
    fill_delay_ms: 100              # Simulated order fill delay
    rejection_rate_pct: 0.0         # % of orders randomly rejected
    partial_fill_enabled: false     # Enable partial fill simulation
    partial_fill_pct: 100           # % of order quantity filled

  # ── Capital defaults ──────────────────────────────────────
  capital:
    default_initial_capital: 1000000.0

  # ── WebSocket simulation ──────────────────────────────────
  websocket:
    max_subscriptions: 1000        # No real limit for paper
    simulated_latency_ms: 0

  # ── Historical data source ────────────────────────────────
  # Paper adapter delegates to active real broker for history
  historical:
    delegate_to_active_broker: true