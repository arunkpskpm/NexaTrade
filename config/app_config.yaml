# ──────────────────────────────────────────────────────────────
# NexaTrade — Application Configuration
# All runtime-tunable settings (non-secret) live here.
# Override any value with an environment variable.
# ──────────────────────────────────────────────────────────────

app:
  name: "NexaTrade"
  version: "1.0.0"
  description: "Algorithmic trading platform for Indian markets"
  timezone: "Asia/Kolkata"

# ── API Server ───────────────────────────────────────────────
api:
  host: "0.0.0.0"
  port: 8000
  reload: false
  workers: 1
  log_level: "info"
  docs_url: "/docs"
  redoc_url: "/redoc"
  openapi_url: "/openapi.json"
  title: "NexaTrade API"
  version: "v1"

# ── CORS ────────────────────────────────────────────────────
cors:
  origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://127.0.0.1:3000"
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

# ── Broker ──────────────────────────────────────────────────
broker:
  reconnect_delay_seconds: 5
  max_reconnect_attempts: 10
  health_check_interval_seconds: 30
  order_timeout_seconds: 30

# ── Feed ────────────────────────────────────────────────────
feed:
  default_interval: "5minute"
  candle_warmup_bars: 200
  max_subscriptions: 50
  tick_persist_enabled: false
  quote_cache_ttl_seconds: 60

# ── Strategy ────────────────────────────────────────────────
strategy:
  plugin_directory: "plugins"
  auto_discover: true
  signal_ttl_seconds: 300
  max_strategy_errors: 5
  auto_activate_on_startup: true

# ── Backtesting ─────────────────────────────────────────────
backtesting:
  default_initial_capital: 1000000.0
  default_slippage_pct: 0.05
  default_commission_pct: 0.03
  default_warmup_bars: 50
  max_concurrent_sweeps: 3

# ── Market Hours (IST) ───────────────────────────────────────
market_hours:
  open_hour: 9
  open_minute: 15
  close_hour: 15
  close_minute: 30
  pre_market_hour: 9
  pre_market_minute: 0
  trading_days: [0, 1, 2, 3, 4]   # Mon=0 … Fri=4

# ── Security ────────────────────────────────────────────────
security:
  password_min_length: 8
  bcrypt_rounds: 12
  rate_limit_per_minute: 60

# ── Logging ──────────────────────────────────────────────────
logging:
  level: "INFO"
  format: "json"
  trade_log_file: "logs/trades.log"
  app_log_file: "logs/app.log"
  max_bytes: 10485760      # 10 MB
  backup_count: 5
  console_enabled: true